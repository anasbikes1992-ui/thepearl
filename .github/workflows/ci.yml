name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @pearlhub/web lint
      - run: pnpm --filter @pearlhub/web typecheck

  api-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - run: cd apps/api && cp .env.example .env && echo "API skeleton ready"

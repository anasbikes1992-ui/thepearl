version: '3.9'

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: pearlhub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  meilisearch:
    image: getmeili/meilisearch:v1.11
    environment:
      MEILI_MASTER_KEY: local-dev-key
    ports:
      - '7700:7700'

volumes:
  postgres_data:
